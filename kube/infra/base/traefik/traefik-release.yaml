apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: traefik
spec:
  releaseName: traefik
  chart:
    spec:
      chart: traefik
      version: '39.0.2'
      sourceRef:
        kind: HelmRepository
        name: traefik
      valuesFiles:
        - values.yaml
  interval: 60m
  install:
    remediation:
      retries: 3
  values:
    ports:
      # Defines the HTTP entry point named 'web'
      web:
        port: 80
        nodePort: 30000
    ingressRoute:
      dashboard:
        enabled: true
        matchRule: Host(`traefik.smc.monachrom.net`)
        entryPoints:
          - web
    # We will route with Gateway API instead.
    ingressClass:
      enabled: false
    providers:
      kubernetesIngress:
        enabled: false
      kubernetesGateway:
        enabled: true
    gateway:
      listeners:
        web:
          port: 80
          protocol: HTTP
          namespacePolicy:
            from: All
      # Enable Observability
      logs:
        general:
          level: INFO
        # This enables access logs, outputting them to Traefik's standard output by default. The [Access Logs Documentation](https://doc.traefik.io/traefik/observability/access-logs/) covers formatting, filtering, and output options.
        access:
          enabled: true