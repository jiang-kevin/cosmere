apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: traefik
spec:
  releaseName: traefik
  chart:
    spec:
      chart: traefik
      version: '39.0.2'
      sourceRef:
        kind: HelmRepository
        name: traefik
      valuesFiles:
        - values.yaml
  interval: 60m
  install:
    remediation:
      retries: 3
  values:
    ingressRoute:
      dashboard:
        enabled: true
        matchRule: Host(`traefik.smc.monachrom.net`)
        entryPoints:
          - web
    providers:
      kubernetesGateway:
        enabled: true
    gateway:
      listeners:
        web:
          namespacePolicy:
            from: All