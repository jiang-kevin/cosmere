apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: metallb
  namespace: metallb-system
spec:
  releaseName: metallb
  chart:
    spec:
      chart: metallb
      version: '0.15.3'
      sourceRef:
        kind: HelmRepository
        name: metallb
      valuesFiles:
        - ./metallb-values.yaml
  interval: 60m
  install:
    remediation:
      retries: 3