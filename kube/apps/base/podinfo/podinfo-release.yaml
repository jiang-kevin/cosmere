apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: podinfo
  namespace: default
spec:
  interval: 10m
  chart:
    spec:
      chart: podinfo
      version: '6.10.2'
      sourceRef:
        kind: HelmRepository
        name: podinfo
        namespace: default
      interval: 10m
  values:
    replicaCount: 1
    httpRoute:
      enabled: true
      hostnames:
        - podinfo.smc.monachrom.net
      rules:
        - matches:
            - path:
                type: PathPrefix
                value: /
          backendRefs:
            - name: podinfo
              port: 80
